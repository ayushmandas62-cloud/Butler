# Butler Desktop Configuration

VERSION=0.1.0-alpha1

DISPLAY=:0

PULSE_SERVER=127.0.0.1

X11_STARTUP_DELAY=2

SESSION=xfce
DESKTOP=xfce

MONITOR_INTERVAL=5

RUNTIME_DIR=$HOME/butler-desktop/runtime
LOG_DIR=$HOME/butler-desktop/logs
AUTO_START_FIREFOX=false
AUTO_START_TERMINAL=false
AUTO_START_VSCODE=false

ENABLE_DBUS=true
ENABLE_X11=true

XFCE_SAFE_MODE=false

LOG_LEVEL=INFO
